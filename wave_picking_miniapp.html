<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Uzum WMS — Отбор v1.2</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
    :root{
      --bg:var(--tg-theme-bg-color,#f5f6fb);
      --card:var(--tg-theme-secondary-bg-color,#fff);
      --text:var(--tg-theme-text-color,#111827);
      --hint:var(--tg-theme-hint-color,#64748b);
      --btn:var(--tg-theme-button-color,#7000ff);
      --btnText:var(--tg-theme-button-text-color,#fff);
      --line:rgba(15,23,42,.10);
      --green:#16a34a;
      --red:#dc2626;
      --orange:#f59e0b;
      --dark:#111827;
      --radius:20px;
      --safeTop:env(safe-area-inset-top);
      --safeBottom:env(safe-area-inset-bottom);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    body{padding-bottom:calc(18px + var(--safeBottom));overflow-x:hidden}
    button,input{font-family:inherit}
    .top{position:sticky;top:0;z-index:20;background:linear-gradient(135deg,#111827,#35125f);color:#fff;padding:calc(12px + var(--safeTop)) 14px 12px;border-bottom-left-radius:22px;border-bottom-right-radius:22px;box-shadow:0 12px 28px rgba(15,23,42,.18)}
    .topRow{display:flex;align-items:center;justify-content:space-between;gap:10px}.title{font-weight:950;font-size:18px;line-height:1}.sub{font-size:12px;color:rgba(255,255,255,.72);margin-top:4px}.pill{border-radius:999px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);padding:6px 10px;font-size:12px;font-weight:950;white-space:nowrap}.wrap{padding:14px}.screen{display:none}.screen.active{display:block}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:0 6px 18px rgba(15,23,42,.04);margin-bottom:12px}.muted{color:var(--hint);font-size:13px;line-height:1.35}.label{display:block;color:var(--hint);font-size:12px;font-weight:950;text-transform:uppercase;letter-spacing:.35px;margin:12px 0 6px}.input{width:100%;border:2px solid var(--line);background:var(--card);color:var(--text);border-radius:16px;padding:14px;font-size:17px;outline:none}.input:focus{border-color:var(--btn);box-shadow:0 0 0 4px rgba(112,0,255,.08)}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn{border:0;border-radius:16px;background:var(--btn);color:var(--btnText);font-weight:950;font-size:15px;min-height:48px;padding:12px 14px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px}.btn:disabled{opacity:.45;cursor:default}.btn.secondary{background:var(--card);color:var(--text);border:1.5px solid var(--line)}.btn.green{background:var(--green);color:#fff}.btn.red{background:var(--red);color:#fff}.btn.full{width:100%}.btn.icon{width:52px;min-width:52px;padding:0;font-size:22px}.setup{max-width:520px;margin:7vh auto 0}.hidden{display:none!important}

    .taskHero{background:linear-gradient(135deg,var(--btn),#3b0764);color:#fff;border-radius:26px;padding:16px;margin-bottom:12px;box-shadow:0 16px 42px rgba(112,0,255,.22);overflow:hidden;max-width:100%}
    .taskTop{display:block;min-width:0}.smallTitle{font-size:12px;font-weight:900;text-transform:uppercase;color:rgba(255,255,255,.72);letter-spacing:.35px}.cell{font-size:clamp(34px,12vw,54px);line-height:.98;font-weight:950;letter-spacing:-1.1px;margin-top:6px;overflow-wrap:anywhere;max-width:100%}.sku{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:clamp(18px,5.2vw,22px);font-weight:950;overflow-wrap:anywhere;word-break:break-word;margin-top:10px;max-width:100%}.name{font-size:14px;color:rgba(255,255,255,.78);line-height:1.35;margin-top:7px;overflow-wrap:anywhere}.qty{margin-top:12px;width:100%;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);border-radius:18px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;gap:10px;text-align:left}.qty .n{font-size:clamp(28px,8vw,38px);font-weight:950;line-height:1;white-space:nowrap}.qty .t{font-size:11px;color:rgba(255,255,255,.78);font-weight:950;text-transform:uppercase;letter-spacing:.35px}.qty .unit{font-size:13px;color:rgba(255,255,255,.78);font-weight:900;margin-left:4px}.progress{height:11px;background:rgba(255,255,255,.22);border-radius:999px;overflow:hidden;margin-top:14px}.fill{height:100%;width:0;background:#22c55e;border-radius:999px;transition:width .2s ease}.progressText{font-size:13px;color:rgba(255,255,255,.78);font-weight:850;margin-top:8px;display:flex;justify-content:space-between;gap:10px;min-width:0}.progressText span{min-width:0;overflow-wrap:anywhere}

    .scanCard{background:#0f172a;color:#fff;border-radius:22px;padding:14px;margin-bottom:12px}.scanLabel{font-size:12px;font-weight:950;text-transform:uppercase;color:#cbd5e1;letter-spacing:.4px;margin-bottom:9px}.scanRow{display:grid;grid-template-columns:1fr 52px 74px;gap:8px}.scanRow input{background:#fff;color:#111827;border:0;border-radius:16px;padding:14px;text-align:center;font-size:22px;font-weight:950;outline:none;min-width:0}.scanRow input:focus{box-shadow:0 0 0 4px rgba(255,255,255,.18)}.scanMsg{min-height:22px;margin-top:10px;font-size:13px;font-weight:850;color:#93c5fd}.scanMsg.ok{color:#22c55e}.scanMsg.err{color:#f87171}.miniProgress{display:flex;gap:8px;margin-bottom:12px}.miniCard{flex:1;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px;text-align:center}.miniCard .v{font-size:22px;font-weight:950}.miniCard .l{font-size:11px;color:var(--hint);font-weight:900;margin-top:2px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.empty{min-height:55vh;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--hint)}.emptyBox{width:100%;background:var(--card);border:1px dashed var(--line);border-radius:22px;padding:26px 18px}.emptyIcon{font-size:46px;margin-bottom:10px}.toast{position:fixed;z-index:90;left:12px;right:12px;bottom:calc(14px + var(--safeBottom));display:flex;flex-direction:column;gap:8px;pointer-events:none}.toast div{background:#111827;color:#fff;border-radius:16px;padding:12px 14px;font-weight:900;box-shadow:0 12px 30px rgba(0,0,0,.22)}

    .cameraOverlay{position:fixed;inset:0;background:#000;z-index:100;display:none;flex-direction:column;color:#fff}.cameraOverlay.active{display:flex}.cameraTop{padding:calc(12px + var(--safeTop)) 14px 10px;display:flex;justify-content:space-between;align-items:center;gap:10px;background:rgba(0,0,0,.74);z-index:2}.cameraTitle{font-weight:950}.cameraBody{position:relative;flex:1;overflow:hidden}.cameraBody video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}.frame{position:absolute;left:50%;top:46%;width:min(72vw,320px);height:min(72vw,320px);transform:translate(-50%,-50%);border:3px solid rgba(255,255,255,.94);border-radius:24px;box-shadow:0 0 0 9999px rgba(0,0,0,.42)}.frame:after{content:"";position:absolute;left:12px;right:12px;top:12px;height:3px;background:#22c55e;border-radius:999px;box-shadow:0 0 12px #22c55e;animation:laser 1.45s linear infinite alternate}@keyframes laser{from{transform:translateY(0)}to{transform:translateY(calc(min(72vw,320px) - 30px))}}.cameraHint{position:absolute;left:14px;right:14px;bottom:calc(18px + var(--safeBottom));background:rgba(0,0,0,.68);border:1px solid rgba(255,255,255,.16);border-radius:18px;padding:13px;text-align:center;font-size:14px;color:#e5e7eb;font-weight:750}.cameraClose{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.24);color:#fff;border-radius:14px;padding:10px 12px;font-weight:950}

    @media(max-width:390px){.taskHero{padding:14px;border-radius:22px}.cell{font-size:clamp(32px,11vw,42px)}.sku{font-size:18px}.qty{padding:9px 10px;border-radius:16px}.qty .n{font-size:30px}.scanRow{grid-template-columns:1fr 48px 62px}.scanRow input{font-size:19px}.btn.icon{width:48px;min-width:48px}.miniProgress{display:grid;grid-template-columns:1fr 1fr}.wrap{padding:10px}}
  </style>
</head>
<body>
  <div class="top">
    <div class="topRow">
      <div>
        <div class="title">🛒 Отбор</div>
        <div class="sub" id="who">Волна · автозавершение</div>
      </div>
      <button class="pill" id="settingsBtn" type="button">⚙️</button>
    </div>
  </div>

  <main class="wrap">
    <section id="setup" class="screen setup active">
      <div class="card">
        <h2 style="font-size:22px;margin-bottom:6px">Настройка</h2>
        <p class="muted">Укажите оператора один раз. После этого приложение будет сразу открывать активное задание.</p>
        <label class="label">Оператор</label>
        <input id="operatorInput" class="input" placeholder="Имя / Telegram ID" autocomplete="off" />
        <div class="grid2">
          <div>
            <label class="label">Станция</label>
            <input id="stationInput" class="input" value="PICK-01" autocomplete="off" />
          </div>
          <div>
            <label class="label">Заказов</label>
            <input id="waveSizeInput" class="input" type="number" min="1" max="100" value="50" inputmode="numeric" />
          </div>
        </div>
        <div class="grid2">
          <div>
            <label class="label">Маршрут</label>
            <input id="routeInput" class="input" inputmode="numeric" placeholder="опц." />
          </div>
          <div>
            <label class="label">ПВЗ</label>
            <input id="pvzInput" class="input" placeholder="опц." autocomplete="off" />
          </div>
        </div>
        <button class="btn full" id="startBtn" style="margin-top:14px">Открыть задание</button>
      </div>
    </section>

    <section id="waveScreen" class="screen">
      <div id="waveContent"><div class="empty"><div class="emptyBox">Загрузка...</div></div></div>
    </section>
  </main>

  <div id="cameraOverlay" class="cameraOverlay">
    <div class="cameraTop">
      <div>
        <div class="cameraTitle">Сканирование</div>
        <div class="muted" style="color:#cbd5e1" id="cameraExpected">—</div>
      </div>
      <button type="button" class="cameraClose" id="cameraCloseBtn">Закрыть</button>
    </div>
    <div class="cameraBody">
      <video id="cameraVideo" playsinline muted></video>
      <div class="frame"></div>
      <div class="cameraHint">Наведите камеру на QR или штрихкод товара</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
'use strict';

const CONFIG = {
  S_URL: 'https://ysvogudznyuszssdriih.supabase.co',
  S_KEY: 'sb_publishable_kU91fqnkt80hbLcVEms6oA_eXKVzY2A',
  AUTO_START_IF_CONFIGURED: true,
  AUTO_FINISH_WAVE: true,
  CAMERA_SCAN_INTERVAL_MS: 180
};

const tg = window.Telegram?.WebApp;
try { tg?.ready(); tg?.expand(); tg?.disableVerticalSwipes?.(); } catch {}

const db = supabase.createClient(CONFIG.S_URL, CONFIG.S_KEY);
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const pct = (a,b) => b ? Math.min(100, Math.round(Number(a || 0) / Number(b || 0) * 100)) : 0;

let state = {
  operatorId: '',
  stationId: '',
  wave: null,
  progress: null,
  currentTask: null,
  busy: false,
  finishing: false,
  camera: {
    stream: null,
    raf: null,
    detector: null,
    lastScanAt: 0,
    canvas: null,
    ctx: null
  }
};

function toast(msg) {
  const d = document.createElement('div');
  d.textContent = msg;
  $('toast').appendChild(d);
  setTimeout(() => d.remove(), 3200);
}
function h(type) { try { tg?.HapticFeedback?.notificationOccurred?.(type); } catch {} }
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
}
function setBusy(v) {
  state.busy = v;
  document.querySelectorAll('button').forEach(b => {
    if (b.id === 'cameraCloseBtn' || b.id === 'settingsBtn') return;
    b.disabled = v;
  });
}
async function rpc(name, args) {
  const { data, error } = await db.rpc(name, args || {});
  if (error) throw error;
  if (data?.ok === false) throw new Error(data.error || data.message || 'Ошибка');
  return data;
}
function getOperatorFromTg() {
  const u = tg?.initDataUnsafe?.user;
  return u ? `tg:${u.id}:${u.first_name || ''}` : '';
}
function saveSetup() {
  state.operatorId = $('operatorInput').value.trim() || getOperatorFromTg() || 'operator';
  state.stationId = $('stationInput').value.trim() || 'PICK-01';
  localStorage.setItem('wave_operator', state.operatorId);
  localStorage.setItem('wave_station', state.stationId);
  localStorage.setItem('wave_size', $('waveSizeInput').value || '50');
  localStorage.setItem('wave_route', $('routeInput').value.trim());
  localStorage.setItem('wave_pvz', $('pvzInput').value.trim());
  $('who').textContent = `${state.operatorId} · ${state.stationId}`;
}
function loadSetup() {
  $('operatorInput').value = localStorage.getItem('wave_operator') || getOperatorFromTg();
  $('stationInput').value = localStorage.getItem('wave_station') || 'PICK-01';
  $('waveSizeInput').value = localStorage.getItem('wave_size') || '50';
  $('routeInput').value = localStorage.getItem('wave_route') || '';
  $('pvzInput').value = localStorage.getItem('wave_pvz') || '';
  $('who').textContent = $('operatorInput').value && $('stationInput').value
    ? `${$('operatorInput').value} · ${$('stationInput').value}`
    : 'Волна · автозавершение';
}

async function start() {
  saveSetup();
  show('waveScreen');
  await loadOrCreateWave();
}
async function loadOrCreateWave() {
  setBusy(true);
  $('waveContent').innerHTML = '<div class="empty"><div class="emptyBox"><div class="emptyIcon">⏳</div><b>Формирую задание...</b></div></div>';
  try {
    let data = await rpc('get_active_picking_wave', {
      p_operator_id: state.operatorId,
      p_station_id: state.stationId
    });
    if (!data.has_wave) {
      const route = $('routeInput').value.trim();
      const pvz = $('pvzInput').value.trim();
      data = await rpc('create_picking_wave', {
        p_operator_id: state.operatorId,
        p_station_id: state.stationId,
        p_max_orders: Number($('waveSizeInput').value || 50),
        p_route_number: route ? Number(route) : null,
        p_pvz_code: pvz || null
      });
    }
    applyWave(data);
    render();
    await autoFinishIfReady();
  } catch (e) {
    $('waveContent').innerHTML = `
      <div class="empty"><div class="emptyBox">
        <div class="emptyIcon">⚠️</div>
        <b>Не удалось открыть задание</b>
        <p class="muted" style="margin-top:8px">${esc(e.message)}</p>
        <button class="btn full secondary" style="margin-top:14px" onclick="show('setup')">Настройки</button>
      </div></div>`;
    h('error');
  } finally {
    setBusy(false);
  }
}
async function refreshWave() {
  if (!state.wave?.id) return loadOrCreateWave();
  setBusy(true);
  try {
    const data = await rpc('get_picking_wave_details', { p_wave_id: state.wave.id });
    applyWave(data);
    render();
    await autoFinishIfReady();
  } catch (e) {
    toast(e.message);
    h('error');
  } finally {
    setBusy(false);
  }
}
function applyWave(data) {
  state.wave = data.wave || null;
  state.progress = data.progress || {};
  state.currentTask = data.current_task && Object.keys(data.current_task).length ? data.current_task : null;
}

function render() {
  if (!state.wave) {
    $('waveContent').innerHTML = '<div class="empty"><div class="emptyBox">Нет активного задания</div></div>';
    return;
  }
  const p = state.progress || {};
  const percent = pct(p.qty_picked, p.qty_plan);

  if (state.wave.status !== 'IN_PROGRESS') {
    $('waveContent').innerHTML = `
      <div class="empty"><div class="emptyBox">
        <div class="emptyIcon">✅</div>
        <b>Задание завершено</b>
        <p class="muted" style="margin-top:8px">Волна ${esc(state.wave.wave_no)} · ${esc(p.qty_picked || 0)}/${esc(p.qty_plan || 0)} шт.</p>
        <button class="btn full" style="margin-top:16px" onclick="newWave()">Получить новое задание</button>
      </div></div>`;
    return;
  }

  if (state.finishing) {
    $('waveContent').innerHTML = `
      <div class="empty"><div class="emptyBox">
        <div class="emptyIcon">⏳</div>
        <b>Завершаю задание...</b>
        <p class="muted" style="margin-top:8px">Все позиции собраны. Перевожу заказы дальше.</p>
      </div></div>`;
    return;
  }

  const t = state.currentTask;
  if (!t) {
    $('waveContent').innerHTML = `
      <div class="empty"><div class="emptyBox">
        <div class="emptyIcon">✅</div>
        <b>Все позиции собраны</b>
        <p class="muted" style="margin-top:8px">Автоматически завершаю задание.</p>
      </div></div>`;
    return;
  }

  $('waveContent').innerHTML = `
    <div class="taskHero">
      <div class="taskTop">
        <div>
          <div class="smallTitle">Ячейка</div>
          <div class="cell">${esc(t.cell_code)}</div>
          <div class="sku">${esc(t.sku)}</div>
          <div class="name">${esc(t.item_name || '')}${t.attr1 ? ' · ' + esc(t.attr1) : ''}${t.attr2 ? ' · ' + esc(t.attr2) : ''}</div>
        </div>
        <div class="qty">
          <div class="t">Осталось собрать</div>
          <div><span class="n">${esc(t.qty_remaining)}</span><span class="unit">шт.</span></div>
        </div>
      </div>
      <div class="progress"><div class="fill" style="width:${percent}%"></div></div>
      <div class="progressText"><span>${esc(p.qty_picked || 0)}/${esc(p.qty_plan || 0)} шт.</span><span>${percent}%</span></div>
    </div>

    <div class="scanCard">
      <div class="scanLabel">Скан товара</div>
      <div class="scanRow">
        <input id="skuInput" placeholder="SKU" autocomplete="off" inputmode="text" />
        <button class="btn icon" type="button" onclick="openCamera()">📷</button>
        <button class="btn green" type="button" onclick="scanSku()">OK</button>
      </div>
      <div id="scanMsg" class="scanMsg">Ожидаю: ${esc(t.sku)}</div>
    </div>

    <div class="miniProgress">
      <div class="miniCard"><div class="v">${esc(p.orders_done || 0)}/${esc(p.orders_total || 0)}</div><div class="l">заказы</div></div>
      <div class="miniCard"><div class="v">${esc(t.qty_remaining)}</div><div class="l">эта позиция</div></div>
    </div>

    <div class="actions">
      <button class="btn secondary" type="button" onclick="refreshWave()">↻ Обновить</button>
      <button class="btn red" type="button" onclick="cancelWave()">Отмена</button>
    </div>`;
  setTimeout(() => $('skuInput')?.focus(), 80);
}

function extractSkuFromScan(raw) {
  let value = String(raw || '').trim();
  if (!value) return '';
  try {
    const obj = JSON.parse(value);
    if (obj && typeof obj === 'object') {
      value = obj.sku || obj.SKU || obj.barcode || obj.code || obj.order_id || value;
    }
  } catch {}
  const urlMatch = value.match(/[?&](?:sku|SKU|barcode|code)=([^&]+)/);
  if (urlMatch) value = decodeURIComponent(urlMatch[1]);
  value = value.replace(/^SKU[:=]/i, '').trim();
  return value;
}

async function scanSku(valueFromCamera = null) {
  if (state.busy) return;
  const input = $('skuInput');
  const sku = extractSkuFromScan(valueFromCamera ?? input?.value);
  if (!sku) return;
  const expected = state.currentTask;
  if (!expected) {
    toast('Все позиции уже собраны');
    if (input) input.value = '';
    await autoFinishIfReady();
    return;
  }

  setBusy(true);
  const msg = $('scanMsg');
  if (msg) { msg.className = 'scanMsg'; msg.textContent = 'Проверяю...'; }
  try {
    const data = await rpc('scan_wave_sku', {
      p_wave_id: state.wave.id,
      p_sku: sku,
      p_expected_cell: expected.cell_code,
      p_operator_id: state.operatorId,
      p_station_id: state.stationId
    });
    applyWave(data);
    h('success');
    toast(data.message || `Принято: ${sku}`);
    render();
    await autoFinishIfReady();
  } catch (e) {
    if (msg) { msg.className = 'scanMsg err'; msg.textContent = e.message; }
    toast(e.message);
    h('error');
  } finally {
    if (input) input.value = '';
    setBusy(false);
    setTimeout(() => $('skuInput')?.focus(), 80);
  }
}

function isWaveReadyToFinish() {
  const p = state.progress || {};
  const complete = p.is_complete === true || (Number(p.qty_plan || 0) > 0 && Number(p.qty_picked || 0) >= Number(p.qty_plan || 0));
  return state.wave?.status === 'IN_PROGRESS' && complete && !state.currentTask;
}
async function autoFinishIfReady() {
  if (!CONFIG.AUTO_FINISH_WAVE || state.finishing || !isWaveReadyToFinish()) return;
  state.finishing = true;
  render();
  try {
    const data = await rpc('finish_picking_wave', {
      p_wave_id: state.wave.id,
      p_operator_id: state.operatorId,
      p_station_id: state.stationId
    });
    applyWave(data);
    h('success');
    toast(data.message || 'Задание завершено');
  } catch (e) {
    h('error');
    toast(e.message);
  } finally {
    state.finishing = false;
    render();
  }
}
async function cancelWave() {
  if (state.busy || !state.wave) return;
  const reason = prompt('Причина отмены', 'Отмена оператора') || '';
  if (!confirm('Снять резерв и отменить текущее задание?')) return;
  setBusy(true);
  try {
    const data = await rpc('cancel_picking_wave', {
      p_wave_id: state.wave.id,
      p_operator_id: state.operatorId,
      p_station_id: state.stationId,
      p_reason: reason
    });
    applyWave(data);
    h('warning');
    toast(data.message || 'Задание отменено');
    render();
  } catch (e) {
    toast(e.message);
    h('error');
  } finally {
    setBusy(false);
  }
}
function newWave() {
  state.wave = null;
  state.progress = null;
  state.currentTask = null;
  show('setup');
}

async function openCamera() {
  if (state.camera.stream) return closeCamera();
  const overlay = $('cameraOverlay');
  const video = $('cameraVideo');
  $('cameraExpected').textContent = state.currentTask ? `Ожидаю: ${state.currentTask.sku}` : 'Скан товара';
  overlay.classList.add('active');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width: { ideal: 1280 },
        height: { ideal: 720 }
      },
      audio: false
    });
    state.camera.stream = stream;
    video.srcObject = stream;
    await video.play();
    if ('BarcodeDetector' in window) {
      try {
        state.camera.detector = new BarcodeDetector({
          formats: ['qr_code','code_128','ean_13','ean_8','upc_a','upc_e','code_39','itf']
        });
      } catch { state.camera.detector = null; }
    }
    state.camera.canvas = document.createElement('canvas');
    state.camera.ctx = state.camera.canvas.getContext('2d', { willReadFrequently: true });
    cameraLoop();
  } catch (e) {
    closeCamera();
    toast('Нет доступа к камере. Введите SKU вручную.');
    h('error');
  }
}
function closeCamera() {
  if (state.camera.raf) cancelAnimationFrame(state.camera.raf);
  state.camera.raf = null;
  if (state.camera.stream) {
    state.camera.stream.getTracks().forEach(t => t.stop());
    state.camera.stream = null;
  }
  const video = $('cameraVideo');
  if (video) video.srcObject = null;
  $('cameraOverlay').classList.remove('active');
}
async function cameraLoop(now = 0) {
  if (!state.camera.stream) return;
  state.camera.raf = requestAnimationFrame(cameraLoop);
  if (now - state.camera.lastScanAt < CONFIG.CAMERA_SCAN_INTERVAL_MS) return;
  state.camera.lastScanAt = now;
  const video = $('cameraVideo');
  if (!video || video.readyState < video.HAVE_ENOUGH_DATA) return;

  try {
    if (state.camera.detector) {
      const codes = await state.camera.detector.detect(video);
      if (codes && codes.length) {
        const value = codes[0].rawValue || '';
        closeCamera();
        await scanSku(value);
        return;
      }
    }
  } catch {}

  try {
    const canvas = state.camera.canvas;
    const ctx = state.camera.ctx;
    if (!canvas || !ctx || !window.jsQR) return;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'dontInvert' });
    if (code?.data) {
      closeCamera();
      await scanSku(code.data);
    }
  } catch {}
}

$('startBtn').onclick = start;
$('settingsBtn').onclick = () => { closeCamera(); show('setup'); };
$('cameraCloseBtn').onclick = closeCamera;
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement?.id === 'skuInput') scanSku();
});
document.addEventListener('visibilitychange', () => {
  if (document.hidden) closeCamera();
});

function init() {
  loadSetup();
  const hasConfig = Boolean(($('operatorInput').value || '').trim() && ($('stationInput').value || '').trim());
  if (CONFIG.AUTO_START_IF_CONFIGURED && hasConfig) {
    start();
  }
}
init();
</script>
</body>
</html>
